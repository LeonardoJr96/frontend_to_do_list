name: ci-cd-backend

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set metadata
        id: meta
        run: echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lab-devops-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/lab-devops-frontend:${{ steps.meta.outputs.image_tag }}

  update-gitops:
      runs-on: ubuntu-latest
      if: github.event_name == 'push'
      steps:
        - name: Checkout GitOps repository
          uses: actions/checkout@v4
          with:
            repository: ${{ secrets.GITOPS_REPO }}
            token: ${{ secrets.GITOPS_TOKEN }}
            path: gitops

        - name: Setup Kustomize
          uses: imranismail/setup-kustomize@v2

        - name: Update image tag in kustomization
          run: |
            cd gitops/argocd/frontend/k8s
            kustomize edit set image \
              ${{ secrets.DOCKERHUB_USERNAME }}/lab-devops-frontend=\
              ${{ secrets.DOCKERHUB_USERNAME }}/lab-devops-frontend:${{ needs.build-and-push.outputs.image_tag }}

        - name: Commit and push
          run: |
            cd gitops
            git config user.name "github-actions"
            git config user.email "github-actions@users.noreply.github.com"
            git add .
            git commit -m "chore: update frontend image tag to ${{ needs.build-and-push.outputs.image_tag }}" || echo "No changes to commit"
            git push